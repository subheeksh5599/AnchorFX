name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contract-tests:
    name: Contract Tests (Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup update stable && rustup target add wasm32-unknown-unknown
      - name: Run escrow contract tests
        working-directory: contracts/anchorfx-escrow
        run: cargo test
      - name: Run oracle contract tests
        working-directory: contracts/anchorfx-oracle
        run: cargo test
      - name: Verify WASM build (escrow)
        working-directory: contracts/anchorfx-escrow
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Verify WASM build (oracle)
        working-directory: contracts/anchorfx-oracle
        run: cargo build --target wasm32-unknown-unknown --release

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test
      - name: TypeCheck (tsc)
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Format Check
        working-directory: frontend
        run: npx prettier --check "app/**/*.{ts,tsx}" "components/**/*.{ts,tsx}" "lib/**/*.ts"
      - name: Lint
        working-directory: frontend
        run: npx eslint . --quiet
      - name: Security Audit (npm)
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: contracts/anchorfx-escrow
      - name: Clippy lint (escrow)
        run: cargo clippy -- -D warnings
        working-directory: contracts/anchorfx-escrow
      - name: Clippy lint (oracle)
        run: cargo clippy -- -D warnings
        working-directory: contracts/anchorfx-oracle
